name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  update-major-tag:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Move major and minor version tags
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          MAJOR="v$(echo "$TAG" | sed 's/^v//' | cut -d. -f1)"
          MINOR="v$(echo "$TAG" | sed 's/^v//' | cut -d. -f1-2)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" -m "Update $MAJOR tag to $TAG"
          git tag -fa "$MINOR" -m "Update $MINOR tag to $TAG"
          git push origin "$MAJOR" --force
          git push origin "$MINOR" --force
